 <!DOCTYPE html>
<html lang="zh">
 <head>
    <title>ian粉絲網</title>
  <meta charset="UTF-8">
   <style>
    body { font-family: Arial, sans-serif; text-align: center; }
    #game { width: 400px; height: 400px; margin: 20px auto; display: grid; grid-template: repeat(4, 1fr) / repeat(4, 1fr); gap: 5px; }
    .cell { background: #ccc0b3; font-size: 30px; display: flex; justify-content: center; align-items: center; font-weight: bold; }
  </style>
 </head>
 <body>
   <h1>潘秋棠</h1>
   <p>來財</p>
   <img src="https://s.yimg.com/ny/api/res/1.2/J3AcFJUqBogEDZLo9mdsdg--/YXBwaWQ9aGlnaGxhbmRlcjt3PTk2MDtoPTcwMg--/https://s.yimg.com/os/creatr-uploaded-images/2023-03/08740240-ca23-11ed-b8fe-8486d07069f5" />
  <h1>2048</h1>
  <div id="game"></div>
  <script>
    const game = document.getElementById("game");
    let grid = Array(4).fill().map(() => Array(4).fill(0));

    function draw() {
      game.innerHTML = "";
      grid.forEach(row => row.forEach(val => {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.textContent = val === 0 ? "" : val;
        cell.style.background = val ? "#f2b179" : "#cdc1b4";
        game.appendChild(cell);
      }));
    }

    function addRandom() {
      let empty = [];
      grid.forEach((row, i) => row.forEach((val, j) => { if (!val) empty.push([i,j]); }));
      if (empty.length) {
        let [i,j] = empty[Math.floor(Math.random()*empty.length)];
        grid[i][j] = Math.random() < 0.9 ? 2 : 4;
      }
    }

    function slide(row) {
      row = row.filter(v => v);
      for (let i=0; i<row.length-1; i++) {
        if (row[i] === row[i+1]) {
          row[i] *= 2;
          row[i+1] = 0;
        }
      }
      return row.filter(v => v).concat(Array(4-row.filter(v=>v).length).fill(0));
    }

    function moveLeft() {
      grid = grid.map(row => slide(row));
    }
    function moveRight() {
      grid = grid.map(row => slide(row.reverse()).reverse());
    }
    function moveUp() {
      grid = grid[0].map((_, j) => slide(grid.map(row => row[j]))).map((col, j) => col.map((val,i)=>grid[i][j]=val));
    }
    function moveDown() {
      grid = grid[0].map((_, j) => slide(grid.map(row => row[j]).reverse()).reverse()).map((col, j) => col.map((val,i)=>grid[i][j]=val));
    }

    document.addEventListener("keydown", e => {
      if (e.key === "ArrowLeft") moveLeft();
      if (e.key === "ArrowRight") moveRight();
      if (e.key === "ArrowUp") moveUp();
      if (e.key === "ArrowDown") moveDown();
      addRandom();
      draw();
    });

    addRandom(); addRandom();
    draw();
  </script>
 </body>
</html>
